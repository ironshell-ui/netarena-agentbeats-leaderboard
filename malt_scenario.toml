[green_agent]
agentbeats_id = "019ba416-0462-7cf2-86f0-bf85123df8a4"
env = { LOG_LEVEL = "INFO" }

[[participants]]
image = "ghcr.io/ironshell-ui/claudecowork-agent:latest"
name = "malt_operator"
env = { DEEPSEEK_API_KEY = "", KIMI_API_KEY = "", MINIMAX_API_KEY = "", SERPAPI_KEY = "", OPENAI_API_KEY = "" }

[config]
prompt_type = "fewshot_cot"
complexity_level = ["level1", "level2", "level3"]
num_queries = 1

# DO NOT MODIFY BELOW THIS LINE.
output_dir = "dump"
output_file = "query_output.jsonl"
benchmark_path = "assessment_queries.jsonl"
regenerate_query = true
